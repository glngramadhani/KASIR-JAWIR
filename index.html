<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASIR BOS PRO - Anti Lag</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;600&display=swap');
        :root { 
            --primary: #1e3799; --gold: #d4af37; --danger: #ef4444; --success: #16a34a; --shadow: 0 10px 25px rgba(0,0,0,0.1); 
            --bg-app: #f1f5f9; --bg-card: #ffffff; --text-main: #0a1128; --text-sub: #64748b; --border: #e2e8f0;
        }
        body.dark-theme { 
            --bg-app: #060b1a; --bg-card: #111a2e; --text-main: #f8fafc; --text-sub: #94a3b8; --border: #1e293b;
        }
        * { box-sizing: border-box; transition: background 0.2s; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: #cbd5e1; margin: 0; display: flex; justify-content: center; color: var(--text-main); }
        .app-container { width: 100%; max-width: 480px; background: var(--bg-app); min-height: 100vh; position: relative; }

        /* HEADER & LAMPU */
        .header { background: linear-gradient(135deg, var(--primary), #4a69bd); color: white; padding: 40px 20px; border-radius: 0 0 35px 35px; text-align: center; position: relative; }
        #theme-toggle { position: absolute; top: 15px; right: 15px; cursor: pointer; }
        #lamp-head { width: 18px; height: 18px; border-radius: 50%; background: #94a3b8; margin: 0 auto; box-shadow: 0 0 0px transparent; }
        body.dark-theme #lamp-head { background: var(--gold); box-shadow: 0 0 15px var(--gold); }
        
        /* PAGES */
        .page { display: none; padding: 20px 20px 120px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        .card { background: var(--bg-card); padding: 18px; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 15px; border: 1px solid var(--border); }
        
        /* NAV */
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; height: 70px; background: rgba(10,17,40,0.98); backdrop-filter: blur(10px); display: none; justify-content: space-around; align-items: center; border-radius: 20px; z-index: 1000; }
        .nav-item { color: #64748b; font-size: 10px; border: none; background: none; text-align: center; flex: 1; }
        .nav-item.active { color: var(--gold); font-weight: 700; }
        .nav-item i { font-size: 18px; display: block; margin-bottom: 2px; font-style: normal; }

        /* BUTTONS */
        .btn-gold { background: var(--gold); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; }
        .badge { padding: 5px 10px; border-radius: 8px; font-size: 10px; border: none; color: white; cursor: pointer; font-weight: 600; }
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); margin: 5px 0; background: var(--bg-card); color: var(--text-main); }

        #login-screen { position: fixed; inset: 0; z-index: 9999; background: #0a1128; display: flex; justify-content: center; align-items: center; padding: 25px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-screen">
        <div style="text-align: center; color: white; width: 100%;">
            <h1 style="font-family: Montserrat;">KASIR BOS</h1>
            <input type="text" id="id-warung" placeholder="ID MERCHANT">
            <input type="password" id="id-token" placeholder="TOKEN">
            <button onclick="core.login()" class="btn-gold" style="margin-top:10px">MASUK</button>
        </div>
    </div>

    <div id="qris-pay-overlay" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10001; display:none; justify-content:center; align-items:center; padding:20px;">
        <div class="card" style="width:100%; max-width:320px; text-align:center;">
            <h3>Scan QRIS</h3>
            <img id="cust-qris" style="width:100%; display:none; border-radius:10px; margin: 10px 0;">
            <div id="qris-placeholder" style="padding:40px; border:2px dashed #ccc; margin:10px 0;">Belum Upload Foto</div>
            <h2 id="qris-amt" style="color:var(--primary)">Rp 0</h2>
            <button onclick="pos.done()" class="btn-gold">SUDAH LUNAS</button>
            <p onclick="ui.hideQR()" style="color:red; cursor:pointer; margin-top:15px;">Tutup</p>
        </div>
    </div>

    <nav class="bottom-nav" id="main-nav">
        <button class="nav-item active" onclick="ui.tab('p-home', this)"><i>🏠</i>Home</button>
        <button class="nav-item" onclick="ui.tab('p-kasir', this)"><i>🛒</i>Kasir</button>
        <button class="nav-item" onclick="ui.tab('p-lapor', this)"><i>📊</i>Lapor</button>
        <button class="nav-item" onclick="ui.tab('p-stok', this)"><i>📦</i>Stok</button>
        <button class="nav-item" onclick="ui.tab('p-data', this)"><i>⚙️</i>Data</button>
    </nav>

    <div id="p-home" class="page active">
        <div class="header">
            <div id="theme-toggle" onclick="ui.toggleTheme()"><div id="lamp-head"></div></div>
            <small id="disp-id" style="color:white"></small>
            <h1 id="v-rev" style="font-size: 32px; margin: 5px 0; color:white">Rp 0</h1>
            <p style="font-size:12px; color:white">Saldo Bersih Hari Ini</p>
        </div>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:-25px; padding:0 20px">
            <div class="card" style="text-align:center"><small>Order</small><h2 id="v-ord" style="margin:5px 0">0</h2></div>
            <div class="card" style="text-align:center; color:var(--danger)"><small>Keluar</small><h2 id="v-exp" style="margin:5px 0">0</h2></div>
        </div>
    </div>

    <div id="p-kasir" class="page">
        <h3>Menu</h3>
        <div id="l-menu" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        <div class="card" style="margin-top:20px; border-top: 4px solid var(--gold);">
            <h4>Keranjang</h4>
            <div id="cart-list" style="font-size:13px"></div>
            <hr style="border:0; border-top:1px dashed var(--border); margin:10px 0;">
            <div style="display:flex; justify-content:space-between"><b>Total</b><b id="cart-t">Rp 0</b></div>
            <input type="number" id="cash-in" oninput="pos.calChange()" placeholder="Uang Tunai..." style="margin-top:10px">
            <div style="display:flex; justify-content:space-between; margin-top:5px"><small>Kembali:</small><b id="cash-change" style="color:var(--success)">Rp 0</b></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px">
                <button onclick="pos.pay('CASH')" class="btn-gold" style="background:#475569">TUNAI</button>
                <button onclick="pos.pay('QRIS')" class="btn-gold">QRIS</button>
            </div>
        </div>
    </div>

    <div id="p-lapor" class="page">
        <h3>Laporan Penjualan</h3>
        <div class="card"><h4>Terlaris</h4><div id="l-terlaris"></div></div>
        <div class="card">
            <h4>Catat Pengeluaran</h4>
            <input type="text" id="ex-note" placeholder="Belanja apa?">
            <input type="number" id="ex-amt" placeholder="Habis berapa?">
            <button onclick="pos.addExpense()" class="btn-gold" style="background:var(--danger)">Simpan Pengeluaran</button>
        </div>
        <div class="card"><h4>Riwayat Keluar</h4><div id="l-expense"></div></div>
    </div>

    <div id="p-stok" class="page">
        <h3>Manajemen Stok</h3>
        <div class="card">
            <h4 id="form-title">Tambah Menu</h4>
            <input type="hidden" id="edit-id">
            <input type="text" id="n-name" placeholder="Nama Menu">
            <input type="number" id="n-price" placeholder="Harga">
            <button onclick="inv.save()" class="btn-gold">SIMPAN</button>
        </div>
        <div id="l-stok"></div>
    </div>

    <div id="p-data" class="page">
        <h3>Pengaturan</h3>
        <div class="card">
            <h4>Upload QRIS</h4>
            <input type="file" id="qris-upload" accept="image/*">
        </div>
        <button onclick="pos.reset()" style="width:100%; padding:12px; margin-bottom:10px">Reset Data Hari Ini</button>
        <button onclick="core.logout()" style="width:100%; padding:14px; background:var(--danger); color:white; border:none; border-radius:12px; font-weight:700">LOGOUT</button>
    </div>
</div>

<script>
    const core = {
        KEY: "BOSSJAWIR",
        login() {
            const id = document.getElementById('id-warung').value.toUpperCase();
            const tk = document.getElementById('id-token').value;
            if(id && tk === this.gen(id)) {
                localStorage.setItem('kb_id', id);
                localStorage.setItem('kb_ses', new Date().toDateString());
                location.reload();
            } else { alert("Token Salah!"); }
        },
        gen(id) {
            const s = new Date().toDateString() + id + this.KEY;
            let h = 0; for(let i=0; i<s.length; i++) h = ((h<<5)-h)+s.charCodeAt(i);
            return "KB" + Math.abs(h).toString().substring(0,4);
        },
        check() {
            if(localStorage.getItem('kb_ses') === new Date().toDateString()) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                document.getElementById('disp-id').innerText = "ID: " + localStorage.getItem('kb_id');
                pos.init();
            }
        },
        logout() { localStorage.removeItem('kb_ses'); location.reload(); }
    };

    const pos = {
        rev: parseInt(localStorage.getItem('kb_rev')) || 0,
        ord: parseInt(localStorage.getItem('kb_ord')) || 0,
        exp: parseInt(localStorage.getItem('kb_exp')) || 0,
        cart: [],
        menu: JSON.parse(localStorage.getItem('kb_menu')) || [{id:1, n:'Mie Aceh', p:15000, s:10, laku:0}],
        expenses: JSON.parse(localStorage.getItem('kb_ex_list')) || [],

        init() { this.render(); this.upDash(); inv.render(); this.renderLaporan(); ui.loadTheme(); this.initQR(); },
        initQR() {
            const up = document.getElementById('qris-upload');
            if(up) up.onchange = function() {
                const r = new FileReader();
                r.onload = () => { localStorage.setItem('kb_qris_img', r.result); alert("QRIS Berhasil Diupload!"); };
                r.readAsDataURL(this.files[0]);
            };
        },
        render() {
            const b = document.getElementById('l-menu'); b.innerHTML = '';
            this.menu.forEach(m => {
                b.innerHTML += `<div class="card" style="text-align:center; padding:10px; cursor:pointer" onclick="pos.add(${m.id})">
                    <b>${m.n}</b><br><small style="color:var(--gold)">Rp ${m.p.toLocaleString()}</small><br><small>Stok: ${m.s}</small>
                </div>`;
            });
        },
        add(id) {
            const m = this.menu.find(x => x.id == id);
            if(m.s > 0) { 
                this.cart.push({id: m.id, n: m.n, p: m.p}); 
                this.draw(); 
            }
        },
        draw() {
            const b = document.getElementById('cart-list'); let t = 0; b.innerHTML = '';
            this.cart.forEach(c => { t += c.p; b.innerHTML += `<div style="display:flex;justify-content:space-between"><span>${c.n}</span><b>${c.p.toLocaleString()}</b></div>`; });
            document.getElementById('cart-t').innerText = "Rp " + t.toLocaleString();
            this.calChange(); // Hitung ulang kembalian kalau list belanja berubah
        },
        calChange() {
            const total = this.cart.reduce((a, b) => a + b.p, 0);
            const bayar = parseInt(document.getElementById('cash-in').value) || 0;
            const kembali = bayar - total;
            const el = document.getElementById('cash-change');
            if(bayar === 0) { el.innerText = "Rp 0"; el.style.color = "var(--text-sub)"; }
            else if(kembali < 0) { el.innerText = "Uang Kurang!"; el.style.color = "var(--danger)"; }
            else { el.innerText = "Rp " + kembali.toLocaleString(); el.style.color = "var(--success)"; }
        },
        addExpense() {
            const n = document.getElementById('ex-note').value, a = parseInt(document.getElementById('ex-amt').value);
            if(!n || !a) return;
            this.expenses.push({n, a, d: new Date().toLocaleTimeString()});
            this.exp += a;
            localStorage.setItem('kb_exp', this.exp);
            localStorage.setItem('kb_ex_list', JSON.stringify(this.expenses));
            document.getElementById('ex-note').value = ''; document.getElementById('ex-amt').value = '';
            this.init();
        },
        pay(type) {
            const t = this.cart.reduce((a,b) => a+b.p, 0); if(t == 0) return;
            if(type == 'QRIS') {
                const img = localStorage.getItem('kb_qris_img');
                const el = document.getElementById('cust-qris');
                if(img) { el.src = img; el.style.display = 'block'; document.getElementById('qris-placeholder').style.display='none'; }
                document.getElementById('qris-amt').innerText = "Rp " + t.toLocaleString();
                document.getElementById('qris-pay-overlay').style.display = 'flex';
            } else { this.done(); }
        },
        done() {
            this.cart.forEach(c => { 
                const i = this.menu.findIndex(m => m.id == c.id); 
                if(i!==-1) { this.menu[i].s -= 1; this.menu[i].laku = (this.menu[i].laku || 0) + 1; }
            });
            this.rev += this.cart.reduce((a,b) => a+b.p, 0); this.ord += 1;
            localStorage.setItem('kb_rev', this.rev); localStorage.setItem('kb_ord', this.ord);
            localStorage.setItem('kb_menu', JSON.stringify(this.menu));
            this.cart = []; document.getElementById('cash-in').value = '';
            ui.hideQR(); this.init();
            alert("Transaksi Berhasil!");
        },
        renderLaporan() {
            const bl = document.getElementById('l-terlaris'); bl.innerHTML = '';
            this.menu.sort((a,b) => (b.laku||0) - (a.laku||0)).forEach(m => {
                if(m.laku > 0) bl.innerHTML += `<div style="display:flex;justify-content:space-between;font-size:13px"><span>${m.n}</span><b>${m.laku} terjual</b></div>`;
            });
            const be = document.getElementById('l-expense'); be.innerHTML = '';
            this.expenses.forEach(e => {
                be.innerHTML += `<div style="display:flex;justify-content:space-between;font-size:13px;color:var(--danger)"><span>${e.n}</span><b>- Rp ${e.a.toLocaleString()}</b></div>`;
            });
        },
        upDash() { 
            document.getElementById('v-rev').innerText = "Rp " + (this.rev - this.exp).toLocaleString(); 
            document.getElementById('v-ord').innerText = this.ord;
            document.getElementById('v-exp').innerText = "Rp " + this.exp.toLocaleString();
        },
        reset() { if(confirm("Reset semua data?")) { localStorage.clear(); location.reload(); } }
    };

    const inv = {
        save() {
            const n = document.getElementById('n-name').value, p = parseInt(document.getElementById('n-price').value), id = document.getElementById('edit-id').value;
            if(!n || !p) return;
            if(id) {
                const i = pos.menu.findIndex(m => m.id == id);
                pos.menu[i].n = n; pos.menu[i].p = p;
                document.getElementById('edit-id').value = '';
                document.getElementById('form-title').innerText = "Tambah Menu";
            } else { pos.menu.push({id: Date.now(), n, p, s: 20, laku:0}); }
            localStorage.setItem('kb_menu', JSON.stringify(pos.menu));
            document.getElementById('n-name').value = ''; document.getElementById('n-price').value = '';
            pos.init();
        },
        edit(id) {
            const m = pos.menu.find(x => x.id == id);
            document.getElementById('n-name').value = m.n; 
            document.getElementById('n-price').value = m.p;
            document.getElementById('edit-id').value = m.id;
            document.getElementById('form-title').innerText = "Edit: " + m.n;
            window.scrollTo(0,0);
        },
        del(id) { if(confirm("Hapus menu ini?")) { pos.menu = pos.menu.filter(m => m.id != id); localStorage.setItem('kb_menu', JSON.stringify(pos.menu)); pos.init(); } },
        plus(id) { const i = pos.menu.findIndex(m => m.id == id); pos.menu[i].s += 10; localStorage.setItem('kb_menu', JSON.stringify(pos.menu)); pos.init(); },
        render() {
            const b = document.getElementById('l-stok'); b.innerHTML = '';
            pos.menu.forEach(m => {
                b.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center; padding:12px">
                    <div><b>${m.n}</b><br><small>Rp ${m.p.toLocaleString()}</small><br><small>Stok: ${m.s}</small></div>
                    <div style="display:flex; gap:5px">
                        <button class="badge" style="background:var(--primary)" onclick="inv.edit(${m.id})">Edit</button>
                        <button class="badge" style="background:var(--danger)" onclick="inv.del(${m.id})">Del</button>
                        <button class="badge" style="background:#64748b" onclick="inv.plus(${m.id})">+10</button>
                    </div>
                </div>`;
            });
        }
    };

    const ui = {
        tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        },
        hideQR() { document.getElementById('qris-pay-overlay').style.display = 'none'; },
        toggleTheme() { 
            document.body.classList.toggle('dark-theme'); 
            localStorage.setItem('kb_theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light'); 
        },
        loadTheme() { if(localStorage.getItem('kb_theme') === 'dark') document.body.classList.add('dark-theme'); }
    };
    core.check();
</script>
</body>
</html>
