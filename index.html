<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASIR BOS - Premium Merchant</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #1e3799; --gold: #d4af37; --dark: #0a1128; --light: #f1f5f9; --danger: #ef4444; --shadow: 0 15px 35px rgba(0,0,0,0.1); }
        * { box-sizing: border-box; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: #cbd5e1; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 480px; background: var(--light); min-height: 100vh; position: relative; box-shadow: 0 0 100px rgba(0,0,0,0.3); overflow-x: hidden;}

        /* STYLING DASHBOARD & UI */
        .header { background: linear-gradient(135deg, var(--primary), #4a69bd); color: white; padding: 40px 25px; border-radius: 0 0 40px 40px; text-align: center; }
        .page { display: none; padding: 20px 20px 120px; animation: fadeIn 0.5s; }
        .page.active { display: block; }
        @keyframes fadeIn { from {opacity:0; transform:translateY(10px)} to {opacity:1; transform:translateY(0)} }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 15px; }
        
        /* NAVIGATION */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 70px; background: rgba(10,17,40,0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; align-items: center; border-radius: 20px; z-index: 1000; }
        .nav-item { color: #64748b; font-size: 10px; border: none; background: none; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--gold); font-weight: 700; }
        
        /* FORM & BUTTONS */
        input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #ddd; margin: 5px 0; font-family: inherit; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; }
        .btn-action { border: none; padding: 8px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: 600; margin-left: 4px; }
        .bg-edit { background: var(--primary); color: white; }
        .bg-del { background: var(--danger); color: white; }
        .bg-plus { background: #eee; color: #333; }

        /* MODAL QRIS */
        #qris-pay-overlay { position: fixed; inset: 0; z-index: 10000; display: none; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; padding: 25px; }
        .modal { background: white; padding: 25px; border-radius: 30px; width: 100%; max-width: 350px; text-align: center; }
        #cust-qris { width: 100%; max-width: 220px; border-radius: 15px; margin: 10px auto; display: block; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="qris-pay-overlay">
        <div class="modal">
            <h3 style="margin:0">Pembayaran QRIS</h3>
            <div style="background:#f1f5f9; padding:15px; border-radius:20px; margin:15px 0">
                <img id="cust-qris" src="" style="display:none;">
                <div id="qris-placeholder" style="padding:30px; border:2px dashed #ccc; border-radius:10px; font-size:12px; color:#999">QRIS BELUM DIUPLOAD</div>
            </div>
            <h2 id="qris-amt" style="color:var(--primary); margin:0">Rp 0</h2>
            <button onclick="pos.done()" class="btn-gold" style="margin-top:20px">SUDAH BAYAR</button>
            <p onclick="ui.hideQR()" style="color:red; font-size:12px; margin-top:15px; cursor:pointer">Batal</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="ui.tab('p-home', this)"><i>🏠</i><br>Home</button>
        <button class="nav-item" onclick="ui.tab('p-kasir', this)"><i>🛒</i><br>Kasir</button>
        <button class="nav-item" onclick="ui.tab('p-stok', this)"><i>📦</i><br>Stok</button>
        <button class="nav-item" onclick="ui.tab('p-data', this)"><i>📊</i><br>Data</button>
    </nav>

    <div id="p-home" class="page active">
        <div class="header">
            <small id="disp-id">Merchant BOS</small>
            <h1 id="v-rev">Rp 0</h1>
            <p style="font-size:12px; opacity:0.8">Omset Hari Ini</p>
        </div>
    </div>

    <div id="p-kasir" class="page">
        <h3>Kasir</h3>
        <div id="l-menu" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;"></div>
        <div class="card" style="margin-top:20px">
            <h4>Keranjang</h4>
            <div id="cart-list"></div>
            <hr>
            <div style="display:flex; justify-content:space-between"><b>Total</b><b id="cart-t">Rp 0</b></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
                <button onclick="pos.pay('CASH')" class="btn-gold" style="background:#64748b">CASH</button>
                <button onclick="pos.pay('QRIS')" class="btn-gold">QRIS</button>
            </div>
        </div>
    </div>

    <div id="p-stok" class="page">
        <h3>Manajemen Menu</h3>
        <div class="card" style="border: 2px solid var(--gold);">
            <h4 id="form-title">Tambah Menu</h4>
            <input type="hidden" id="edit-id">
            <input type="text" id="n-name" placeholder="Nama Menu">
            <input type="number" id="n-price" placeholder="Harga">
            <button onclick="inv.save()" class="btn-gold" id="btn-save" style="margin-top:10px">Simpan Menu</button>
        </div>
        <div id="l-stok"></div>
    </div>

    <div id="p-data" class="page">
        <h3>Pengaturan</h3>
        <div class="card">
            <h4>Upload QRIS Merchant</h4>
            <input type="file" id="qris-upload" accept="image/*">
        </div>
        <button onclick="pos.reset()" class="btn-danger" style="width:100%; padding:15px">Reset Data Transaksi</button>
    </div>
</div>

<script>
    const pos = {
        rev: parseInt(localStorage.getItem('kb_rev')) || 0,
        cart: [],
        menu: JSON.parse(localStorage.getItem('kb_menu')) || [
            {id: 1, n: 'Es Teh Manis', p: 5000, s: 20},
            {id: 2, n: 'MIE ACEH', p: 15000, s: 20}
        ],

        init() { this.render(); this.upDash(); inv.render(); this.initQR(); },
        
        initQR() {
            const up = document.getElementById('qris-upload');
            if(up) up.onchange = function() {
                const r = new FileReader();
                r.onload = () => { localStorage.setItem('kb_qris_img', r.result); alert("QRIS Tersimpan!"); };
                r.readAsDataURL(this.files[0]);
            };
        },

        render() {
            const b = document.getElementById('l-menu'); b.innerHTML = '';
            this.menu.forEach(m => {
                b.innerHTML += `<div class="card" style="text-align:center; padding:15px; cursor:pointer" onclick="pos.add(${m.id})">
                    <b>${m.n}</b><br><small>Rp ${m.p.toLocaleString()}</small><br><span style="font-size:10px">Stok: ${m.s}</span>
                </div>`;
            });
        },

        add(id) { 
            const m = this.menu.find(x => x.id == id);
            if(m.s > 0) { this.cart.push(m); this.draw(); }
        },

        draw() {
            const b = document.getElementById('cart-list'); let t = 0; b.innerHTML = '';
            this.cart.forEach(c => { t += c.p; b.innerHTML += `<div style="display:flex;justify-content:space-between;font-size:12px"><span>${c.n}</span><span>${c.p}</span></div>`; });
            document.getElementById('cart-t').innerText = "Rp " + t.toLocaleString();
            return t;
        },

        pay(type) {
            const t = this.draw(); if(t == 0) return;
            if(type == 'QRIS') {
                const img = localStorage.getItem('kb_qris_img');
                const el = document.getElementById('cust-qris');
                const pl = document.getElementById('qris-placeholder');
                if(img) { el.src = img; el.style.display = 'block'; pl.style.display = 'none'; }
                document.getElementById('qris-amt').innerText = "Rp " + t.toLocaleString();
                document.getElementById('qris-pay-overlay').style.display = 'flex';
            } else { this.done(); }
        },

        done() {
            const t = this.draw();
            this.cart.forEach(c => { const i = this.menu.findIndex(m => m.id == c.id); if(i!=-1) this.menu[i].s -= 1; });
            this.rev += t; localStorage.setItem('kb_rev', this.rev);
            localStorage.setItem('kb_menu', JSON.stringify(this.menu));
            alert("Sukses!"); this.cart = []; this.init(); ui.hideQR();
        },

        upDash() { document.getElementById('v-rev').innerText = "Rp " + this.rev.toLocaleString(); },
        reset() { if(confirm("Hapus data?")) { localStorage.setItem('kb_rev', 0); location.reload(); } }
    };

    const inv = {
        save() {
            const n = document.getElementById('n-name').value, p = parseInt(document.getElementById('n-price').value), id = document.getElementById('edit-id').value;
            if(!n || !p) return;
            if(id) {
                const i = pos.menu.findIndex(m => m.id == id);
                pos.menu[i].n = n; pos.menu[i].p = p;
                document.getElementById('edit-id').value = '';
                document.getElementById('form-title').innerText = "Tambah Menu";
                document.getElementById('btn-save').innerText = "Simpan Menu";
            } else {
                pos.menu.push({id: Date.now(), n, p, s: 20});
            }
            localStorage.setItem('kb_menu', JSON.stringify(pos.menu));
            document.getElementById('n-name').value = ''; document.getElementById('n-price').value = '';
            this.render(); pos.render();
        },
        edit(id) {
            const m = pos.menu.find(x => x.id == id);
            document.getElementById('n-name').value = m.n;
            document.getElementById('n-price').value = m.p;
            document.getElementById('edit-id').value = m.id;
            document.getElementById('form-title').innerText = "Edit Menu: " + m.n;
            document.getElementById('btn-save').innerText = "Update Menu";
            window.scrollTo(0,0);
        },
        del(id) {
            if(confirm("Hapus menu ini?")) {
                pos.menu = pos.menu.filter(m => m.id != id);
                localStorage.setItem('kb_menu', JSON.stringify(pos.menu));
                this.render(); pos.render();
            }
        },
        plus(id) {
            const i = pos.menu.findIndex(m => m.id == id);
            pos.menu[i].s += 10; localStorage.setItem('kb_menu', JSON.stringify(pos.menu));
            this.render();
        },
        render() {
            const b = document.getElementById('l-stok'); b.innerHTML = '';
            pos.menu.forEach(m => {
                b.innerHTML += `<div class="card" style="display:flex; justify-content:space-between; align-items:center">
                    <div><b>${m.n}</b><br><small>Rp ${m.p} | Stok: ${m.s}</small></div>
                    <div style="display:flex">
                        <button class="btn-action bg-edit" onclick="inv.edit(${m.id})">Edit</button>
                        <button class="btn-action bg-del" onclick="inv.del(${m.id})">Del</button>
                        <button class="btn-action bg-plus" onclick="inv.plus(${m.id})">+ Stok</button>
                    </div>
                </div>`;
            });
        }
    };

    const ui = {
        tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        },
        hideQR() { document.getElementById('qris-pay-overlay').style.display = 'none'; }
    };
    pos.init();
</script>
</body>
</html>
