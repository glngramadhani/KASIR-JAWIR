<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASIR BOS PRO</title>
    <style>
        /* Pakai style yang sama dengan sebelumnya, hanya ada tambahan kecil untuk Nama Toko */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Poppins:wght@300;400;600&display=swap');
        :root { --primary: #1e3799; --gold: #d4af37; --danger: #ef4444; --success: #16a34a; --bg-app: #f1f5f9; --bg-card: #ffffff; --text-main: #0a1128; --text-sub: #64748b; --border: #e2e8f0; }
        body.dark-theme { --bg-app: #060b1a; --bg-card: #111a2e; --text-main: #f8fafc; --text-sub: #94a3b8; --border: #1e293b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: #cbd5e1; margin: 0; display: flex; justify-content: center; color: var(--text-main); transition: 0.3s; }
        .app-container { width: 100%; max-width: 480px; background: var(--bg-app); min-height: 100vh; position: relative; overflow-x: hidden; }
        .header { background: linear-gradient(135deg, var(--primary), #4a69bd); color: white; padding: 50px 20px 70px; border-radius: 0 0 40px 40px; text-align: center; position: relative; }
        #theme-toggle { position: absolute; top: 15px; right: 20px; cursor: pointer; }
        #lamp-head { width: 22px; height: 22px; border-radius: 50%; background: #94a3b8; transition: 0.3s; }
        body.dark-theme #lamp-head { background: var(--gold); box-shadow: 0 0 15px var(--gold); }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: -35px 20px 20px; position: relative; z-index: 5; }
        .page { display: none; padding: 20px 20px 120px; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from {opacity:0;} to {opacity:1;} }
        .card { background: var(--bg-card); padding: 18px; border-radius: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid var(--border); }
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; height: 75px; background: rgba(10,17,40,0.98); backdrop-filter: blur(10px); display: none; justify-content: space-around; align-items: center; border-radius: 25px; z-index: 1000; }
        .nav-item { color: #64748b; font-size: 10px; border: none; background: none; text-align: center; flex: 1; }
        .nav-item.active { color: var(--gold); font-weight: 700; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 3px; font-style: normal; }
        input { width: 100%; padding: 14px; border-radius: 15px; border: 1px solid var(--border); margin: 8px 0; background: var(--bg-card); color: var(--text-main); font-family: inherit; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 16px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; }
        .badge { padding: 6px 12px; border-radius: 10px; font-size: 11px; border: none; color: white; cursor: pointer; font-weight: 600; }
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: #0a1128; display: flex; justify-content: center; align-items: center; padding: 30px; }
        #qris-pay-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 25px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-screen">
        <div style="text-align: center; width: 100%;">
            <h1 style="color:white; font-family: Montserrat;">KASIR BOS</h1>
            <input type="text" id="id-warung" placeholder="ID MERCHANT">
            <input type="password" id="id-token" placeholder="TOKEN AKSES">
            <button onclick="core.login()" class="btn-gold" style="margin-top:15px">MASUK</button>
        </div>
    </div>

    <div id="qris-pay-overlay">
        <div class="card" style="width:100%; max-width:340px; text-align:center;">
            <h3 id="qris-store-name">Nama Toko</h3>
            <img id="cust-qris" style="width:100%; display:none; border-radius:15px; margin: 15px 0;">
            <h2 id="qris-amt" style="color:var(--primary); margin:0">Rp 0</h2>
            <button onclick="pos.done()" class="btn-gold" style="margin-top:20px">SUDAH LUNAS</button>
            <p onclick="ui.hideQR()" style="color:var(--danger); cursor:pointer; margin-top:20px;">BATAL</p>
        </div>
    </div>

    <nav class="bottom-nav" id="main-nav">
        <button class="nav-item active" onclick="ui.tab('p-home', this)"><i>🏠</i>Home</button>
        <button class="nav-item" onclick="ui.tab('p-kasir', this)"><i>🛒</i>Kasir</button>
        <button class="nav-item" onclick="ui.tab('p-lapor', this)"><i>📊</i>Lapor</button>
        <button class="nav-item" onclick="ui.tab('p-stok', this)"><i>📦</i>Stok</button>
        <button class="nav-item" onclick="ui.tab('p-data', this)"><i>⚙️</i>Data</button>
    </nav>

    <div id="p-home" class="page active">
        <div class="header">
            <div id="theme-toggle" onclick="ui.toggleTheme()"><div id="lamp-head"></div></div>
            <h2 id="display-nama-toko" style="margin:0; font-size:18px; letter-spacing:1px;">NAMA TOKO</h2>
            <h1 id="v-rev" style="font-family: Montserrat; font-size: 36px; margin: 10px 0; color:white">Rp 0</h1>
            <p style="font-size:12px; color:rgba(255,255,255,0.8)">Saldo Bersih Hari Ini</p>
        </div>
        <div class="stat-grid">
            <div class="card" style="text-align:center;"><small>ORDER</small><h2 id="v-ord" style="margin:5px 0">0</h2></div>
            <div class="card" style="text-align:center;"><small style="color:var(--danger)">KELUAR</small><h2 id="v-exp" style="margin:5px 0; color:var(--danger)">0</h2></div>
        </div>
    </div>

    <div id="p-kasir" class="page">
        <h3>Menu</h3>
        <div id="l-menu" style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;"></div>
        <div class="card" style="margin-top:25px; border-top: 5px solid var(--gold);">
            <h4>Keranjang</h4>
            <div id="cart-list"></div>
            <hr style="border:0; border-top:1px dashed var(--border); margin:15px 0;">
            <div style="display:flex; justify-content:space-between"><b>Total</b><b id="cart-t">Rp 0</b></div>
            <input type="number" id="cash-in" oninput="pos.calChange()" placeholder="Tunai..." style="margin-top:15px">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px">
                <button onclick="pos.pay('CASH')" class="btn-gold" style="background:#475569">CASH</button>
                <button onclick="pos.pay('QRIS')" class="btn-gold">QRIS</button>
            </div>
        </div>
    </div>

    <div id="p-lapor" class="page"><h3>Laporan</h3><div class="card"><div id="l-terlaris"></div></div><div class="card"><input type="text" id="ex-note" placeholder="Belanja apa?"><input type="number" id="ex-amt" placeholder="Harga"><button onclick="pos.addExpense()" class="btn-gold" style="background:var(--danger)">Catat</button></div></div>
    <div id="p-stok" class="page"><h3>Stok</h3><div class="card"><input type="hidden" id="edit-id"><input type="text" id="n-name" placeholder="Menu"><input type="number" id="n-price" placeholder="Harga"><button onclick="inv.save()" class="btn-gold">Simpan</button></div><div id="l-stok"></div></div>

    <div id="p-data" class="page">
        <h3>Pengaturan Toko</h3>
        <div class="card">
            <h4>Nama Toko / Warung</h4>
            <input type="text" id="input-nama-toko" placeholder="Masukkan Nama Toko">
            <button onclick="ui.saveStoreName()" class="btn-gold">Update Nama Toko</button>
        </div>
        <div class="card">
            <h4>QRIS Toko</h4>
            <input type="file" id="qris-upload" accept="image/*">
        </div>
        <button onclick="pos.reset()" style="width:100%; padding:15px; margin-bottom:10px; border:1px solid var(--border); border-radius:15px; background:none; color:var(--text-main);">Reset Data</button>
        <button onclick="core.logout()" class="btn-gold" style="background:var(--danger)">Logout</button>
    </div>
</div>

<script>
    // Inisialisasi Nama Toko
    let namaToko = localStorage.getItem('kb_nama_toko') || "KASIR BOS";

    const core = {
        KEY: "BOSSJAWIR",
        login() {
            const id = document.getElementById('id-warung').value.toUpperCase();
            const tk = document.getElementById('id-token').value;
            if(id && tk === this.gen(id)) {
                localStorage.setItem('kb_id', id);
                localStorage.setItem('kb_ses', new Date().toDateString());
                location.reload();
            } else { alert("Token Salah!"); }
        },
        gen(id) {
            const s = new Date().toDateString() + id + this.KEY;
            let h = 0; for(let i=0; i<s.length; i++) h = ((h<<5)-h)+s.charCodeAt(i);
            return "KB" + Math.abs(h).toString().substring(0,4);
        },
        check() {
            if(localStorage.getItem('kb_ses') === new Date().toDateString()) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                pos.init();
                ui.refreshStoreName();
            }
        },
        logout() { localStorage.removeItem('kb_ses'); location.reload(); }
    };

    const pos = {
        rev: parseInt(localStorage.getItem('kb_rev')) || 0,
        ord: parseInt(localStorage.getItem('kb_ord')) || 0,
        exp: parseInt(localStorage.getItem('kb_exp')) || 0,
        cart: [],
        menu: JSON.parse(localStorage.getItem('kb_menu')) || [{id:1, n:'Mie Aceh', p:15000, s:10, laku:0}],
        expenses: JSON.parse(localStorage.getItem('kb_ex_list')) || [],

        init() { this.render(); this.upDash(); inv.render(); ui.loadTheme(); this.initQR(); },
        initQR() {
            const up = document.getElementById('qris-upload');
            if(up) up.onchange = function() {
                const r = new FileReader();
                r.onload = () => { localStorage.setItem('kb_qris_img', r.result); alert("QRIS Terpasang!"); };
                r.readAsDataURL(this.files[0]);
            };
        },
        render() {
            const b = document.getElementById('l-menu'); b.innerHTML = '';
            this.menu.forEach(m => {
                b.innerHTML += `<div class="card" style="text-align:center; padding:15px; cursor:pointer" onclick="pos.add(${m.id})">
                    <b>${m.n}</b><br><span style="color:var(--gold)">Rp ${m.p.toLocaleString()}</span><br><small>Stok: ${m.s}</small>
                </div>`;
            });
        },
        add(id) {
            const m = this.menu.find(x => x.id == id);
            if(m && m.s > 0) { this.cart.push({id: m.id, n: m.n, p: m.p}); this.draw(); }
        },
        draw() {
            const b = document.getElementById('cart-list'); let t = 0; b.innerHTML = '';
            this.cart.forEach((c, idx) => { t += c.p; b.innerHTML += `<div style="display:flex;justify-content:space-between;font-size:13px">${c.n}<b>${c.p.toLocaleString()}</b></div>`; });
            document.getElementById('cart-t').innerText = "Rp " + t.toLocaleString();
        },
        calChange() { /* logika hitung kembalian */ },
        pay(type) {
            if(this.cart.length === 0) return;
            if(type === 'QRIS') {
                const img = localStorage.getItem('kb_qris_img');
                const el = document.getElementById('cust-qris');
                if(img) { el.src = img; el.style.display = 'block'; }
                document.getElementById('qris-amt').innerText = document.getElementById('cart-t').innerText;
                document.getElementById('qris-store-name').innerText = namaToko;
                document.getElementById('qris-pay-overlay').style.display = 'flex';
            } else { this.done(); }
        },
        done() {
            this.cart.forEach(c => { 
                const i = this.menu.findIndex(m => m.id == c.id); 
                if(i!==-1) { this.menu[i].s -= 1; this.menu[i].laku = (this.menu[i].laku || 0) + 1; }
            });
            this.rev += this.cart.reduce((a,b) => a+b.p, 0); this.ord += 1;
            localStorage.setItem('kb_rev', this.rev); localStorage.setItem('kb_ord', this.ord);
            localStorage.setItem('kb_menu', JSON.stringify(this.menu));
            alert("Transaksi di " + namaToko + " Berhasil!");
            this.cart = []; location.reload();
        },
        upDash() { 
            document.getElementById('v-rev').innerText = "Rp " + (this.rev - this.exp).toLocaleString(); 
            document.getElementById('v-ord').innerText = this.ord;
            document.getElementById('v-exp').innerText = "Rp " + this.exp.toLocaleString();
        },
        reset() { if(confirm("Hapus semua data?")) { localStorage.clear(); location.reload(); } }
    };

    const inv = { /* logika stok sama seperti sebelumnya */ render() { const b = document.getElementById('l-stok'); b.innerHTML = ''; pos.menu.forEach(m => { b.innerHTML += `<div class="card" style="display:flex; justify-content:space-between">${m.n} <button onclick="inv.plus(${m.id})" class="badge">+10</button></div>`; }); }, plus(id) { const i = pos.menu.findIndex(m => m.id == id); pos.menu[i].s += 10; localStorage.setItem('kb_menu', JSON.stringify(pos.menu)); pos.init(); }, save() { /* logika save menu */ } };

    const ui = {
        tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        },
        saveStoreName() {
            const input = document.getElementById('input-nama-toko').value;
            if(input) {
                localStorage.setItem('kb_nama_toko', input);
                namaToko = input;
                this.refreshStoreName();
                alert("Nama Toko Berhasil Diganti!");
            }
        },
        refreshStoreName() {
            document.getElementById('display-nama-toko').innerText = namaToko;
            document.getElementById('input-nama-toko').value = namaToko;
        },
        hideQR() { document.getElementById('qris-pay-overlay').style.display = 'none'; },
        toggleTheme() { document.body.classList.toggle('dark-theme'); localStorage.setItem('kb_theme', document.body.classList.contains('dark-theme') ? 'dark' : 'light'); },
        loadTheme() { if(localStorage.getItem('kb_theme') === 'dark') document.body.classList.add('dark-theme'); }
    };
    core.check();
</script>
</body>
</html>
