<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KASIR BOS - FIX EDITION</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Poppins:wght@400;600&display=swap');
        :root { 
            --primary: #1e3799; --gold: #d4af37; --danger: #ef4444; --success: #16a34a; 
            --bg-app: #060b1a; --bg-card: #111a2e; --text-main: #f8fafc; --border: #1e293b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; background: #000; margin: 0; color: var(--text-main); }
        .app-container { width: 100%; max-width: 480px; background: var(--bg-app); min-height: 100vh; margin: 0 auto; position: relative; }

        /* UI ELEMENTS */
        .header { background: linear-gradient(135deg, var(--primary), #4a69bd); padding: 50px 20px 80px; border-radius: 0 0 35px 35px; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: -40px 20px 20px; }
        .page { display: none; padding: 15px 15px 120px; }
        .page.active { display: block; }
        .card { background: var(--bg-card); padding: 15px; border-radius: 18px; margin-bottom: 12px; border: 1px solid var(--border); }
        
        /* NAVBAR */
        .bottom-nav { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: 92%; height: 65px; background: #111a2e; display: none; justify-content: space-around; align-items: center; border-radius: 20px; z-index: 1000; border: 1px solid var(--border); }
        .nav-item { color: #64748b; font-size: 10px; border: none; background: none; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { font-size: 20px; display: block; font-style: normal; }

        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); margin: 6px 0; background: #0a1128; color: white; }
        .btn-gold { background: var(--gold); color: white; border: none; padding: 14px; border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer; }
        
        #login-screen { position: fixed; inset: 0; z-index: 9999; background: #0a1128; display: flex; justify-content: center; align-items: center; padding: 25px; }
        #qris-pay-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; justify-content: center; align-items: center; padding: 20px; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="login-screen">
        <div style="text-align: center; width: 100%;">
            <h1 style="font-family: Montserrat; color: white;">KASIR BOS</h1>
            <input type="text" id="id-warung" placeholder="ID MERCHANT">
            <input type="password" id="id-token" placeholder="TOKEN">
            <button onclick="core.login()" class="btn-gold" style="margin-top:10px">MASUK</button>
        </div>
    </div>

    <div id="qris-pay-overlay">
        <div class="card" style="width:100%; max-width:320px; text-align:center;">
            <h3>Bayar QRIS</h3>
            <img id="cust-qris" style="width:100%; border-radius:12px; margin:10px 0; display:none;">
            <h2 id="qris-amt" style="color:var(--gold)">Rp 0</h2>
            <button onclick="pos.done('QRIS')" class="btn-gold">SUDAH LUNAS</button>
            <p onclick="ui.hideQR()" style="color:var(--danger); margin-top:15px; cursor:pointer">BATAL</p>
        </div>
    </div>

    <nav class="bottom-nav" id="main-nav">
        <button class="nav-item active" onclick="ui.tab('p-home', this)"><i>🏠</i>Home</button>
        <button class="nav-item" onclick="ui.tab('p-kasir', this)"><i>🛒</i>Kasir</button>
        <button class="nav-item" onclick="ui.tab('p-lapor', this)"><i>📊</i>Lapor</button>
        <button class="nav-item" onclick="ui.tab('p-stok', this)"><i>📦</i>Stok</button>
        <button class="nav-item" onclick="ui.tab('p-data', this)"><i>⚙️</i>Data</button>
    </nav>

    <div id="p-home" class="page active">
        <div class="header">
            <h2 id="disp-nama" style="margin:0; font-size:16px;">MEMUAT...</h2>
            <h1 id="v-rev" style="font-family: Montserrat; font-size: 34px; margin: 10px 0;">Rp 0</h1>
            <p style="opacity:0.6; font-size:12px;">Saldo Bersih Hari Ini</p>
        </div>
        <div class="stat-grid">
            <div class="card" style="text-align:center;"><small>ORDER</small><h2 id="v-ord" style="margin:5px 0">0</h2></div>
            <div class="card" style="text-align:center;"><small style="color:var(--danger)">KELUAR</small><h2 id="v-exp" style="margin:5px 0; color:var(--danger)">0</h2></div>
        </div>
    </div>

    <div id="p-kasir" class="page">
        <h3>Menu</h3>
        <div id="l-menu" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        
        <div class="card" style="margin-top:20px; border-top: 3px solid var(--gold);">
            <h4>Keranjang</h4>
            <div id="cart-list" style="margin-bottom:10px;"></div>
            <div style="display:flex; justify-content:space-between; border-top:1px solid #334155; padding-top:10px;">
                <b>TOTAL</b><b id="cart-t" style="color:var(--gold)">Rp 0</b>
            </div>
            
            <input type="number" id="cash-in" oninput="pos.calChange()" placeholder="Uang Tunai (Rp)..." style="margin-top:15px; border-color:var(--gold)">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px">
                <small>Kembalian:</small>
                <b id="cash-change" style="color:var(--success)">Rp 0</b>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button onclick="pos.pay('CASH')" class="btn-gold" style="background:#334155">CASH</button>
                <button onclick="pos.pay('QRIS')" class="btn-gold">QRIS</button>
            </div>
        </div>
    </div>

    <div id="p-lapor" class="page">
        <h3>Laporan</h3>
        <div class="card"><h4>Terlaris</h4><div id="l-terlaris"></div></div>
        <div class="card">
            <h4>Catat Pengeluaran</h4>
            <input type="text" id="ex-note" placeholder="Ket"><input type="number" id="ex-amt" placeholder="Rp">
            <button onclick="pos.addEx()" class="btn-gold" style="background:var(--danger); margin-top:10px">SIMPAN</button>
        </div>
        <div id="l-expense"></div>
    </div>

    <div id="p-stok" class="page">
        <h3 id="form-title">Menu Baru</h3>
        <div class="card">
            <input type="hidden" id="edit-id"><input type="text" id="n-name" placeholder="Nama"><input type="number" id="n-price" placeholder="Harga">
            <button onclick="inv.save()" class="btn-gold">SIMPAN</button>
        </div>
        <div id="l-stok"></div>
    </div>

    <div id="p-data" class="page">
        <h3>Data & Akses</h3>
        <div class="card">
            <h4>Nama Toko</h4>
            <input type="text" id="in-nama" placeholder="Nama Toko">
            <button onclick="ui.saveName()" class="btn-gold">UPDATE</button>
        </div>
        <div id="admin-panel" style="display:none;" class="card">
            <h4 style="color:var(--gold)">👑 Boss Gilang Panel</h4>
            <input type="text" id="gen-id" placeholder="ID Customer Baru">
            <button onclick="core.makeToken()" class="btn-gold">BUAT TOKEN</button>
            <div id="token-res" style="margin-top:10px; text-align:center; font-weight:800; color:var(--success);"></div>
        </div>
        <div class="card"><h4>Upload QRIS</h4><input type="file" id="up-qris"></div>
        <button onclick="pos.reset()" style="width:100%; padding:12px; background:none; border:1px solid var(--border); color:var(--danger); border-radius:12px;">Reset Data Hari Ini</button>
        <button onclick="ui.logout()" class="btn-gold" style="background:var(--danger); margin-top:10px">LOGOUT</button>
    </div>
</div>

<script>
    const core = {
        KEY: "BOSSJAWIR", ADMIN_ID: "BOSSGILANG", ADMIN_TOKEN: "181307",
        login() {
            const id = document.getElementById('id-warung').value.trim().toUpperCase();
            const tk = document.getElementById('id-token').value.trim();
            if((id === this.ADMIN_ID && tk === this.ADMIN_TOKEN) || (id && tk === this.gen(id))) {
                localStorage.setItem('kb_id', id);
                localStorage.setItem('kb_ses', new Date().toDateString());
                location.reload();
            } else alert("Gagal!");
        },
        gen(id) {
            const s = new Date().toDateString() + id + this.KEY;
            let h = 0; for(let i=0; i<s.length; i++) h = ((h<<5)-h)+s.charCodeAt(i);
            return "KB" + Math.abs(h).toString().substring(0,4);
        },
        makeToken() {
            const id = document.getElementById('gen-id').value.toUpperCase();
            if(id) document.getElementById('token-res').innerText = "TOKEN: " + this.gen(id);
        },
        check() {
            if(localStorage.getItem('kb_ses') === new Date().toDateString()) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-nav').style.display = 'flex';
                if(localStorage.getItem('kb_id') === this.ADMIN_ID) document.getElementById('admin-panel').style.display = 'block';
                pos.init();
            }
        }
    };

    const pos = {
        rev: parseInt(localStorage.getItem('kb_rev')) || 0,
        ord: parseInt(localStorage.getItem('kb_ord')) || 0,
        exp: parseInt(localStorage.getItem('kb_exp')) || 0,
        menu: JSON.parse(localStorage.getItem('kb_menu')) || [{id:1, n:'Es Teh', p:5000, s:100, laku:0}],
        ex: JSON.parse(localStorage.getItem('kb_ex')) || [],
        cart: [],

        init() { this.render(); this.upDash(); inv.render(); this.report(); ui.refresh(); this.initQR(); },
        initQR() {
            document.getElementById('up-qris').onchange = (e) => {
                const r = new FileReader(); r.onload = () => localStorage.setItem('kb_qris', r.result);
                r.readAsDataURL(e.target.files[0]);
            };
        },
        render() {
            const l = document.getElementById('l-menu'); l.innerHTML = '';
            this.menu.forEach(m => {
                l.innerHTML += `<div class="card" onclick="pos.add(${m.id})" style="text-align:center; padding:10px;"><b>${m.n}</b><br><small>Rp ${m.p.toLocaleString()}</small></div>`;
            });
        },
        add(id) {
            const m = this.menu.find(x => x.id == id);
            if(m && m.s > 0) { this.cart.push({...m}); this.draw(); }
        },
        draw() {
            const l = document.getElementById('cart-list'); let t = 0; l.innerHTML = '';
            this.cart.forEach((c, i) => { t += c.p; l.innerHTML += `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">${c.n} <b onclick="pos.rem(${i})" style="color:var(--danger)">×</b></div>`; });
            document.getElementById('cart-t').innerText = "Rp " + t.toLocaleString();
            this.calChange();
        },
        rem(i) { this.cart.splice(i,1); this.draw(); },
        calChange() {
            const t = this.cart.reduce((a,b)=>a+b.p, 0);
            const cash = parseInt(document.getElementById('cash-in').value) || 0;
            const change = cash - t;
            document.getElementById('cash-change').innerText = "Rp " + (change < 0 ? 0 : change).toLocaleString();
        },
        pay(type) {
            if(!this.cart.length) return;
            if(type === 'QRIS') {
                const img = localStorage.getItem('kb_qris');
                document.getElementById('cust-qris').src = img || '';
                document.getElementById('cust-qris').style.display = img ? 'block' : 'none';
                document.getElementById('qris-amt').innerText = document.getElementById('cart-t').innerText;
                document.getElementById('qris-pay-overlay').style.display = 'flex';
            } else {
                const t = this.cart.reduce((a,b)=>a+b.p, 0);
                const cash = parseInt(document.getElementById('cash-in').value) || 0;
                if(cash < t) return alert("Uang Kurang!");
                this.done('CASH');
            }
        },
        done(method) {
            const total = this.cart.reduce((a,b)=>a+b.p, 0);
            const change = (parseInt(document.getElementById('cash-in').value) || 0) - total;
            
            this.cart.forEach(c => { 
                const i = this.menu.findIndex(m => m.id == c.id); 
                if(i!==-1) { this.menu[i].s--; this.menu[i].laku++; }
            });

            this.rev += total; this.ord++;
            localStorage.setItem('kb_rev', this.rev); localStorage.setItem('kb_ord', this.ord);
            localStorage.setItem('kb_menu', JSON.stringify(this.menu));
            
            const msg = method === 'CASH' ? `Berhasil!\nKembalian: Rp ${change.toLocaleString()}` : "Pembayaran QRIS Berhasil!";
            alert(msg);

            this.cart = []; document.getElementById('cash-in').value = '';
            ui.hideQR(); this.init();
        },
        addEx() {
            const n = document.getElementById('ex-note').value, a = parseInt(document.getElementById('ex-amt').value);
            if(n && a) { this.ex.push({n, a}); this.exp += a; localStorage.setItem('kb_exp', this.exp); localStorage.setItem('kb_ex', JSON.stringify(this.ex)); this.init(); }
        },
        report() {
            const l = document.getElementById('l-terlaris'); l.innerHTML = '';
            [...this.menu].sort((a,b)=>b.laku-a.laku).slice(0,5).forEach(m => { if(m.laku) l.innerHTML += `<div style="font-size:12px;">${m.n}: ${m.laku} terjual</div>`; });
            const e = document.getElementById('l-expense'); e.innerHTML = '';
            this.ex.forEach(x => e.innerHTML += `<div class="card" style="padding:8px;font-size:12px;color:var(--danger)">${x.n}: -${x.a.toLocaleString()}</div>`);
        },
        upDash() {
            document.getElementById('v-rev').innerText = "Rp " + (this.rev - this.exp).toLocaleString();
            document.getElementById('v-ord').innerText = this.ord;
            document.getElementById('v-exp').innerText = "Rp " + this.exp.toLocaleString();
        },
        reset() { if(confirm("Reset data hari ini?")) { localStorage.setItem('kb_rev',0); localStorage.setItem('kb_ord',0); localStorage.setItem('kb_exp',0); localStorage.setItem('kb_ex','[]'); location.reload(); } }
    };

    const inv = {
        save() {
            const n = document.getElementById('n-name').value, p = parseInt(document.getElementById('n-price').value), id = document.getElementById('edit-id').value;
            if(!n || !p) return;
            if(id) { const i = pos.menu.findIndex(m => m.id == id); pos.menu[i].n = n; pos.menu[i].p = p; }
            else pos.menu.push({id: Date.now(), n, p, s: 100, laku:0});
            localStorage.setItem('kb_menu', JSON.stringify(pos.menu)); location.reload();
        },
        edit(id) { const m = pos.menu.find(x => x.id == id); document.getElementById('n-name').value = m.n; document.getElementById('n-price').value = m.p; document.getElementById('edit-id').value = m.id; window.scrollTo(0,0); },
        del(id) { if(confirm("Hapus?")) { pos.menu = pos.menu.filter(m => m.id != id); localStorage.setItem('kb_menu', JSON.stringify(pos.menu)); pos.init(); } },
        render() {
            const l = document.getElementById('l-stok'); l.innerHTML = '';
            pos.menu.forEach(m => {
                l.innerHTML += `<div class="card" style="display:flex;justify-content:space-between;align-items:center;"><span>${m.n}</span><div><button style="background:var(--primary);color:white;border:none;padding:5px 10px;border-radius:5px" onclick="inv.edit(${m.id})">✏️</button> <button style="background:var(--danger);color:white;border:none;padding:5px 10px;border-radius:5px" onclick="inv.del(${m.id})">🗑️</button></div></div>`;
            });
        }
    };

    const ui = {
        tab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        },
        saveName() { const n = document.getElementById('in-nama').value; if(n) { localStorage.setItem('kb_nama', n); this.refresh(); alert("Nama diganti!"); } },
        refresh() { const n = localStorage.getItem('kb_nama') || "KASIR BOS"; document.getElementById('disp-nama').innerText = n; document.getElementById('in-nama').value = n; },
        hideQR() { document.getElementById('qris-pay-overlay').style.display = 'none'; },
        logout() { localStorage.removeItem('kb_ses'); location.reload(); }
    };
    core.check();
</script>
</body>
</html>
