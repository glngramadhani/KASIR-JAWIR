<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'Jawir POS - Executive Master Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

        :root {
            --primary: #6c5ce7;
            --accent: #ff7675;
            --success: #00b894;
            --dark: #2d3436;
            --glass: rgba(255, 255, 255, 0.8);
            --bg: #dfe6e9;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; color: var(--dark); overflow-x: hidden; }

        /* --- LOGIN & SECURITY SCREEN --- */
        #login-screen {
            position: fixed; inset: 0; background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            width: 90%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }
        .qris-login { width: 200px; height: 200px; margin: 20px auto; border: 4px solid #f1f2f6; border-radius: 20px; padding: 10px; }
        input[type="text"], input[type="number"], input[type="password"] {
            width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #f1f2f6; border-radius: 15px; font-family: inherit;
        }
        .btn { border: none; border-radius: 15px; cursor: pointer; font-weight: 700; font-family: inherit; }
        .btn-main { background: var(--primary); color: white; width: 100%; padding: 15px; }
        .btn-main:hover { background: #5849c4; transform: translateY(-2px); }

        /* --- ADMIN PANEL OVERLAY --- */
        #admin-panel {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            z-index: 3000; justify-content: center; align-items: center; color: white;
        }
        .admin-box { background: #2d3436; padding: 30px; border-radius: 25px; width: 90%; max-width: 500px; }

        /* --- MAIN APP INTERFACE --- */
        #main-app { display: none; padding: 25px; max-width: 1200px; margin: auto; }
        
        /* Dashboard Stats */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px); padding: 20px;
            border-radius: 20px; border: 1px solid white; box-shadow: 0 8px 32px rgba(0,0,0,0.05);
        }
        .stat-card h4 { margin: 0; font-size: 0.8rem; color: #636e72; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 1.5rem; font-weight: 700; }

        /* Main Content Layout */
        .layout { display: grid; grid-template-columns: 1fr 380px; gap: 25px; }
        @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } }

        .card { background: white; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); margin-bottom: 25px; }
        
        /* Menu Grid */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .menu-item {
            background: #f9f9fb; padding: 20px; border-radius: 20px; text-align: center;
            cursor: pointer; border: 2px solid transparent;
        }
        .menu-item:hover { border-color: var(--primary); background: #f4f3ff; transform: translateY(-5px); }
        .menu-item span { display: block; font-size: 2rem; margin-bottom: 10px; }
        
        /* Cart Sidebar */
        #cart-list { min-height: 150px; margin-bottom: 20px; }
        .cart-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #eee; font-size: 0.9rem; }
        .total-box { background: #f4f3ff; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .total-box h2 { margin: 5px 0; color: var(--primary); font-size: 2.2rem; }

        /* Modal QRIS Transaksi */
        #modal-qris-trx {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; padding: 30px; border-radius: 30px; text-align: center; max-width: 350px; }

        .text-success { color: var(--success); }
        .text-accent { color: var(--accent); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-card">
        <h2 id="shop-title-login" style="color: var(--primary); margin:0">D'Jawir Premium</h2>
        <p style="font-size: 0.9rem; color: #636e72;">Akses POS Harian - Rp 3.000</p>
        <div class="qris-login">
            <img id="qris-login-img" src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=DJAWIR_MASTER" alt="QRIS" style="width: 100%;">
        </div>
        <input type="text" id="access-key-input" placeholder="Masukkan Kode Akses">
        <button onclick="master.login()" class="btn btn-main">BUKA KASIR</button>
        <p style="font-size: 11px; color: #b2bec3; margin-top: 15px;">Admin? Klik <span onclick="master.showAdminLogin()" style="text-decoration: underline; cursor: pointer;">disini</span></p>
    </div>
</div>

<div id="admin-panel">
    <div class="admin-box">
        <h2 id="adm-head">🔒 Owner Login</h2>
        <div id="adm-auth">
            <input type="password" id="master-pass-input" placeholder="Password Master">
            <button onclick="master.unlockAdmin()" class="btn btn-main">MASUK ADMIN</button>
        </div>
        <div id="adm-content" style="display: none;">
            <p>Kode Akses Hari Ini:</p>
            <h1 id="daily-code-display" style="color: #00b894; background: #1e272e; padding: 10px; border-radius: 10px; text-align: center;">----</h1>
            <hr style="opacity: 0.2;">
            <label>Ubah Nama Warung:</label>
            <input type="text" id="set-shop-name">
            <label>Link Foto QRIS Pembayaran:</label>
            <input type="text" id="set-qris-url">
            <button onclick="master.saveSettings()" class="btn btn-main" style="background: var(--success); margin-top: 10px;">SIMPAN PERUBAHAN</button>
        </div>
        <button onclick="document.getElementById('admin-panel').style.display='none'" class="btn" style="width: 100%; margin-top: 10px; background: none; color: white;">Tutup</button>
    </div>
</div>

<div id="main-app">
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 id="main-title" style="margin:0; color: var(--primary);">D'Jawir POS</h2>
        <button onclick="master.logout()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:600;">Logout</button>
    </header>

    <div class="dashboard">
        <div class="stat-card">
            <h4>Omset Hari Ini</h4>
            <p id="stat-omset" class="text-success">Rp 0</p>
        </div>
        <div class="stat-card">
            <h4>Pengeluaran</h4>
            <p id="stat-exp" class="text-accent">Rp 0</p>
        </div>
        <div class="stat-card">
            <h4>Profit Bersih</h4>
            <p id="stat-profit" style="color: var(--primary)">Rp 0</p>
        </div>
    </div>

    <div class="layout">
        <div class="main-content">
            <div class="card">
                <h3 style="margin-top:0">🍱 Menu Spesial</h3>
                <div id="menu-container" class="menu-grid"></div>
            </div>

            <div class="card">
                <h3 style="margin-top:0">💸 Catat Pengeluaran</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="exp-note" placeholder="Beli apa?" style="flex: 2;">
                    <input type="number" id="exp-amount" placeholder="Harga" style="flex: 1;">
                    <button onclick="pos.addExp()" class="btn btn-main" style="width: auto; padding: 0 20px;">Catat</button>
                </div>
            </div>
        </div>

        <div class="sidebar">
            <div class="card" style="position: sticky; top: 20px;">
                <h3 style="margin-top:0">🛒 Pesanan</h3>
                <div id="cart-list">
                    <p style="text-align: center; color: #b2bec3;">Belum ada pesanan</p>
                </div>
                <div class="total-box">
                    <span>Total Tagihan:</span>
                    <h2 id="cart-total-text">Rp 0</h2>
                </div>
                <button onclick="pos.checkout('Tunai')" class="btn btn-main" style="background: var(--success); margin-bottom: 10px;">BAYAR TUNAI</button>
                <button onclick="pos.showTrxQRIS()" class="btn btn-main" style="background: #0984e3;">BAYAR QRIS</button>
                <button onclick="pos.clearCart()" class="btn" style="width:100%; background:none; color:#b2bec3; font-size:0.8rem; margin-top:10px;">Bersihkan Keranjang</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-qris-trx">
    <div class="modal-content">
        <h3>Scan QRIS Pembayaran</h3>
        <img id="qris-trx-img" src="" style="width: 200px; height: 200px; border-radius: 15px; margin: 15px 0;">
        <h2 id="qris-trx-total" style="color: var(--primary);">Rp 0</h2>
        <button onclick="pos.checkout('QRIS')" class="btn btn-main" style="background: var(--success);">KONFIRMASI SUDAH BAYAR</button>
        <button onclick="document.getElementById('modal-qris-trx').style.display='none'" class="btn" style="width:100%; margin-top:10px; background:none; color: #636e72;">Batal</button>
    </div>
</div>

<script>
    /* --- 1. THE MASTER SECURITY --- */
    class MasterControl {
        constructor() {
            this.MASTER_PASS = "BOSSJAWIR"; // <--- GANTI PASSWORD ADMIN KAMU DISINI
            this.settings = JSON.parse(localStorage.getItem('djw_settings')) || {
                name: "Mie Ayam D'Jawir",
                qris: "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=BAYAR_DJAWIR_3RB"
            };
            this.init();
        }

        init() {
            document.getElementById('shop-title-login').innerText = this.settings.name;
            document.getElementById('main-title').innerText = this.settings.name;
            document.getElementById('qris-login-img').src = this.settings.qris;
            document.getElementById('qris-trx-img').src = this.settings.qris;
            this.checkSession();
        }

        generateDailyCode() {
            const date = new Date().toDateString();
            let hash = 0;
            const secret = date + this.MASTER_PASS;
            for (let i = 0; i < secret.length; i++) {
                hash = ((hash << 5) - hash) + secret.charCodeAt(i);
                hash |= 0;
            }
            return "JW" + Math.abs(hash).toString().substring(0, 4);
        }

        login() {
            const input = document.getElementById('access-key-input').value.toUpperCase();
            if (input === this.generateDailyCode()) {
                localStorage.setItem('djw_session', new Date().toDateString());
                this.showApp();
            } else { alert("Kode Salah! Bayar 3rb ke owner dulu."); }
        }

        checkSession() {
            if (localStorage.getItem('djw_session') === new Date().toDateString()) { this.showApp(); }
        }

        showApp() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }

        showAdminLogin() { document.getElementById('admin-panel').style.display = 'flex'; }

        unlockAdmin() {
            if (document.getElementById('master-pass-input').value === this.MASTER_PASS) {
                document.getElementById('adm-auth').style.display = 'none';
                document.getElementById('adm-content').style.display = 'block';
                document.getElementById('adm-head').innerText = "🛠️ Admin Panel";
                document.getElementById('daily-code-display').innerText = this.generateDailyCode();
                document.getElementById('set-shop-name').value = this.settings.name;
                document.getElementById('set-qris-url').value = this.settings.qris;
            } else { alert("Password Admin Salah!"); }
        }

        saveSettings() {
            this.settings.name = document.getElementById('set-shop-name').value;
            this.settings.qris = document.getElementById('set-qris-url').value;
            localStorage.setItem('djw_settings', JSON.stringify(this.settings));
            location.reload();
        }

        logout() { localStorage.removeItem('djw_session'); location.reload(); }
    }

    /* --- 2. THE POS SYSTEM --- */
    const pos = {
        omset: 0, exp: 0, cart: [],
        menu: [
            {n:'Mie Ayam Ori', p:15000, e:'🍜'},
            {n:'Mie Ayam Bakso', p:22000, e:'🍲'},
            {n:'Soto Jawir', p:18000, e:'🥘'},
            {n:'Es Teh Manis', p:5000, e:'🍹'},
            {n:'Jeruk Peras', p:8000, e:'🍊'}
        ],
        init() {
            const cont = document.getElementById('menu-container');
            this.menu.forEach(m => {
                const d = document.createElement('div'); d.className = 'menu-item';
                d.innerHTML = `<span>${m.e}</span><b>${m.n}</b><br><small>Rp ${m.p.toLocaleString()}</small>`;
                d.onclick = () => { this.cart.push(m); this.renderCart(); };
                cont.appendChild(d);
            });
            this.updateDash();
        },
        renderCart() {
            const list = document.getElementById('cart-list');
            let t = 0; list.innerHTML = '';
            this.cart.forEach((i, idx) => {
                t += i.p;
                list.innerHTML += `<div class="cart-row"><span>${i.n}</span><b>${i.p.toLocaleString()}</b></div>`;
            });
            document.getElementById('cart-total-text').innerText = `Rp ${t.toLocaleString()}`;
            if(this.cart.length === 0) list.innerHTML = '<p style="text-align: center; color: #b2bec3;">Belum ada pesanan</p>';
            return t;
        },
        addExp() {
            const amt = parseInt(document.getElementById('exp-amount').value);
            if(!amt) return;
            this.exp += amt; this.updateDash();
            document.getElementById('exp-note').value = '';
            document.getElementById('exp-amount').value = '';
        },
        showTrxQRIS() {
            const t = this.renderCart(); if(t === 0) return alert("Pilih menu dulu!");
            document.getElementById('qris-trx-total').innerText = `Rp ${t.toLocaleString()}`;
            document.getElementById('modal-qris-trx').style.display = 'flex';
        },
        checkout(metode) {
            const t = this.renderCart(); if(t === 0) return;
            this.omset += t;
            alert(`Transaksi Berhasil (${metode})! Rp ${t.toLocaleString()}`);
            this.cart = []; this.renderCart(); this.updateDash();
            document.getElementById('modal-qris-trx').style.display = 'none';
        },
        updateDash() {
            document.getElementById('stat-omset').innerText = `Rp ${this.omset.toLocaleString()}`;
            document.getElementById('stat-exp').innerText = `Rp ${this.exp.toLocaleString()}`;
            document.getElementById('stat-profit').innerText = `Rp ${(this.omset - this.exp).toLocaleString()}`;
        },
        clearCart() { this.cart = []; this.renderCart(); }
    };

    const master = new MasterControl();
    pos.init();
</script>

</body>
</html>
